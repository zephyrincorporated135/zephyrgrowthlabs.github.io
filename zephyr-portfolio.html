<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zephyr | YouTube Growth Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #050505;
  color: #fff;
  overflow-x: hidden;
}

/* GLOBAL GRID BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: -2;
  animation: gridMove 25s linear infinite;
}

@keyframes gridMove {
  from { transform: translateY(0px); }
  to { transform: translateY(50px); }
}

/* soft glow overlay */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 20%, rgba(124,92,255,0.15), transparent 40%),
              radial-gradient(circle at 80% 80%, rgba(0,212,255,0.12), transparent 45%);
  z-index: -1;
  pointer-events: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 110px 20px 30px;
}

.hero h1 {
  font-size: 3rem;
  font-weight: 800;
  margin: 0;
}

/* CLIENTS HEADER */
.clients-header {
  text-align: center;
  margin-bottom: 10px;
  color: #aaa;
  letter-spacing: 6px;
  font-size: 0.85rem;
}

/* PROFILE */
.profile {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: rgba(15,15,15,0.8);
  border: 1px solid #1c1c1c;
  border-radius: 18px;
  padding: 18px 22px;
  max-width: 520px;
  margin: 25px auto 30px;
  backdrop-filter: blur(10px);
}

.profile img {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 2px solid #7c5cff;
  object-fit: cover;
}

.profile h3 { margin: 0; font-size: 1.2rem; }
.profile p { margin: 2px 0 0; color: #aaa; }

/* STATS */
.stats {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin: 20px 0 60px;
}

.stat {
  background: rgba(15,15,15,0.75);
  border: 1px solid #1a1a1a;
  padding: 16px 20px;
  border-radius: 14px;
  min-width: 160px;
  text-align: center;
  transition: 0.3s;
}

.stat:hover {
  transform: translateY(-5px);
  border-color: #7c5cff;
}

.stat h2 {
  margin: 0;
  font-size: 1.8rem;
}

/* VIDEOS */
.videos {
  max-width: 720px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding: 0 20px 80px;
}

.video-card {
  position: relative;
  background: rgba(15,15,15,0.85);
  border: 1px solid #1d1d1d;
  border-radius: 14px;
  overflow: hidden;
  text-decoration: none;
  color: white;
  transition: 0.25s ease;
}

.video-card:hover {
  transform: scale(1.02);
  border-color: #7c5cff;
}

.video-card iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  display: block;
  border: none;
}

.views {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.8);
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 0.75rem;
  z-index: 1;
  pointer-events: none;
}

footer {
  text-align: center;
  padding: 40px;
  color: #555;
}
</style>
</head>

<body>

<section class="hero">

  <h1>Zephyr Growth Systems</h1>

  <!-- CLIENTS HEADER -->
  <div class="clients-header">CLIENTS</div>

  <!-- PROFILE -->
  <div class="profile">
    <img src="https://jumpshare.com/s/TTNG4YHUcPceWS53uO3J" alt="Profile">
    <div>
      <h3>Zephyr</h3>
      <p>11.3K Subscribers • 1.5M+ Views</p>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><h2>1.5M+</h2><p>Views</p></div>
    <div class="stat"><h2>11.3K</h2><p>Subscribers</p></div>
    <div class="stat"><h2>4</h2><p>Core Videos</p></div>
  </div>

</section>

<!-- VIDEOS -->
<section class="videos">

  <div class="video-card">
    <div class="views">672K+ Views</div>
    <iframe src="https://www.youtube.com/embed/RS1-hFFGqRI" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
  </div>

  <div class="video-card">
    <div class="views">140K+ Views</div>
    <iframe src="https://www.youtube.com/embed/7bN39CmeAq4" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
  </div>

  <div class="video-card">
    <div class="views">271K+ Views</div>
    <iframe src="https://www.youtube.com/embed/O4um9FcgCAs" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
  </div>

  <div class="video-card">
    <div class="views">118K+ Views</div>
    <iframe src="https://www.youtube.com/embed/3GyCO3zzYsw" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
  </div>

</section>

<footer>
  Zephyr Growth Labs
</footer>

</body>
</html>
